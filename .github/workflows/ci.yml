name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r tools/requirements-cnipa.txt pytest
      - name: Validate Python syntax
        run: python -m compileall -q tools tests
      - name: Run tests
        env:
          PYTHONUTF8: "1"
        run: python -m pytest -q
      - name: Diagnose core environment
        run: python tools/doctor.py
